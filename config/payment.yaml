spring:
  application:
    name: "${SPRING_APPLICATION_NAME:payment}"
  datasource:
    url: "${DB_URL}"
  kafka:
    bootstrap-servers: "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    consumer:
      group-id: "${KAFKA_GROUP_ID:payment-service}"
    topic:
      user-created: "${KAFKA_TOPIC_USER_CREATED:user-created}"
      transfer-request-created: "${KAFKA_TOPIC_TRANSFER_CREATED:transfer-request-created}"

payment:
  remote:
    git:
      repository-url: "${GIT_REPOSITORY_URL}"
      repository-username: "${GIT_REPOSITORY_USERNAME}"
      token: "${GIT_TOKEN}"
  scheduler:
    enabled: "${SCHEDULER_ENABLED:true}"
    fixedRate: "${SCHEDULER_FIXED_RATE:60000}"
  batch:
    enabled: "${PAYMENT_BATCH_ENABLED:true}"
    cron: "0 0 0 * * *"
    chunkSize: "10"
  kafka:
    enabled: "${PAYMENT_KAFKA_ENABLED:true}"
  monetbil:
    enabled: "${PAYMENT_MONETBIL_ENABLED:true}"
  external:
    service:
      monetbil:
        url: "${PAYMENT_EXTERNAL_SERVICE_MONETBIL_URL:https://api.monetbil.com}"
        key: "${PAYMENT_EXTERNAL_SERVICE_MONETBIL_KEY}"
